apiVersion: v1
kind: Namespace
metadata:
  name: bughunter

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: bughunter-config
  namespace: bughunter
data:
  POSTGRES_DB: "bughunter_db"
  POSTGRES_USER: "postgres"
  POSTGRES_HOST: "db-service"
  POSTGRES_PORT: "5432"
  REDIS_URL: "redis://redis-service:6379/0"
  DEBUG: "False"

---

apiVersion: v1
kind: Secret
metadata:
  name: bughunter-secrets
  namespace: bughunter
type: Opaque
data:
  # Base64 encoded placeholder values (override during deployment)
  POSTGRES_PASSWORD: cG9zdGdyZXNfc2VjdXJlX3Bhc3N3b3JkXzIwMjY=
  GEMINI_API_KEY: Y2hhbmdlX21lX2luX3Byb2R1Y3Rpb24=

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: bughunter
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---

# PostgreSQL Deployment & Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-deployment
  namespace: bughunter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: bughunter-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: bughunter-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bughunter-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: postgres-storage
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc

---

apiVersion: v1
kind: Service
metadata:
  name: db-service
  namespace: bughunter
spec:
  ports:
    - port: 5432
  selector:
    app: db

---

# Redis Deployment & Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-deployment
  namespace: bughunter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379

---

apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: bughunter
spec:
  ports:
    - port: 6379
  selector:
    app: redis

---

# Django Backend Deployment & Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: bughunter
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: django
          image: gcr.io/bughunter-ai/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: bughunter-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: bughunter-config
                  key: POSTGRES_USER
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: bughunter-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: bughunter-config
                  key: POSTGRES_PORT
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: bughunter-config
                  key: REDIS_URL
            - name: DEBUG
              valueFrom:
                configMapKeyRef:
                  name: bughunter-config
                  key: DEBUG
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bughunter-secrets
                  key: POSTGRES_PASSWORD
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bughunter-secrets
                  key: GEMINI_API_KEY
          command: ["sh", "-c", "python manage.py migrate --noinput && python manage.py collectstatic --noinput && python manage.py runserver 0.0.0.0:8000"]

---

apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: bughunter
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: backend

---

# Celery Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker-deployment
  namespace: bughunter
spec:
  replicas: 2
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      containers:
        - name: celery
          image: gcr.io/bughunter-ai/backend:latest
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: bughunter-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: bughunter-config
                  key: POSTGRES_USER
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: bughunter-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: bughunter-config
                  key: POSTGRES_PORT
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: bughunter-config
                  key: REDIS_URL
            - name: DEBUG
              valueFrom:
                configMapKeyRef:
                  name: bughunter-config
                  key: DEBUG
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bughunter-secrets
                  key: POSTGRES_PASSWORD
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bughunter-secrets
                  key: GEMINI_API_KEY
          command: ["celery", "-A", "config", "worker", "--loglevel=info"]

---

# Frontend (Nginx) Deployment & Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: bughunter
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: nginx
          image: gcr.io/bughunter-ai/frontend:latest
          ports:
            - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: bughunter
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: frontend
