version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bughunter_db
    environment:
      POSTGRES_DB: bughunter_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_password_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bughunter_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: devops/Dockerfile.backend
    container_name: bughunter_backend
    environment:
      - DEBUG=False
      - POSTGRES_DB=bughunter_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_secure_password_2026
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - django_static:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"

  celery_worker:
    build:
      context: ..
      dockerfile: devops/Dockerfile.backend
    container_name: bughunter_celery_worker
    environment:
      - DEBUG=False
      - POSTGRES_DB=bughunter_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_secure_password_2026
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config worker --loglevel=info

  frontend:
    build:
      context: ..
      dockerfile: devops/Dockerfile.frontend
    container_name: bughunter_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    volumes:
      - django_static:/app/staticfiles:ro

volumes:
  postgres_data:
  redis_data:
  django_static:
